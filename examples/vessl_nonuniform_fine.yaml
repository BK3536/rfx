name: rfx-nonuniform-fine
description: "Non-uniform mesh: dx=0.25mm lateral + dz=0.4mm substrate snap"
tags: [rfx, nonuniform, accuracy, sub1pct]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}')"
  echo "=== Non-uniform fine lateral dx=0.25mm + raw source ==="
  python examples/26_nonuniform_fine.py
