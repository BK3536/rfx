name: rfx-convergence-0125mm
description: "dx=0.125mm patch antenna convergence verification"
tags: [rfx, convergence, fine-grid]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  pip install -q -e .
  python -c "import jax; d=jax.devices()[0]; print(f'Backend: {jax.default_backend()}, Memory: {d.memory_stats()[\"bytes_limit\"]/1e9:.1f}GB')"
  python examples/20_convergence_0125.py
