name: rfx-patch-antenna
description: "Patch antenna simulation with WirePort on GPU"
tags: [rfx, patch-antenna, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.04-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  echo "=== Patch Antenna on GPU ===" && echo "Node:$(hostname)" && echo "Start:$(date)"
  pip install -q -e .
  python -c "import jax; print(f'Backend: {jax.default_backend()}, Devices: {jax.devices()}')"
  python examples/04_patch_antenna.py
  echo "=== Done $(date) ==="
