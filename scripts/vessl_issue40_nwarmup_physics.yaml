name: rfx-issue40-nwarmup-physics
description: "Issue #40 physics check: n_warmup must preserve forward physics"
tags: [rfx, issue-40, physics, nu, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git fetch --all
  git checkout feat-n-warmup
  git pull --ff-only origin feat-n-warmup || true
  pip install -q -e ".[dev]"

  echo "=========================================="
  echo "Issue #40 physics: forward bit-match + harminv with n_warmup"
  echo "=========================================="
  python - <<'PY'
  import numpy as np
  from rfx import Simulation, Box
  from rfx.auto_config import smooth_grading
  from rfx.sources.sources import GaussianPulse
  from rfx.harminv import harminv
  import math

  # Small-ish patch: dx=1mm, graded dz with substrate explicitly aligned.
  dx = 1e-3
  dz_sub = 0.25e-3
  trans = np.geomspace(dx, dz_sub, 7)[1:-1]
  dz = np.concatenate([
      np.full(12, dx), trans, np.full(8, dz_sub), trans[::-1], np.full(24, dx)
  ])
  sim = Simulation(freq_max=4e9, domain=(0.08, 0.075, 0), dx=dx,
                   dz_profile=dz, boundary="cpml", cpml_layers=8)
  eps0 = 8.8541878128e-12
  sigma_fr4 = 2 * np.pi * 2.4e9 * eps0 * 4.3 * 0.02
  sim.add_material("fr4", eps_r=4.3, sigma=sigma_fr4)
  z0 = float(np.sum(dz[:12 + len(trans)]))
  sim.add(Box((0.010, 0.010, z0 - dz_sub), (0.070, 0.065, z0)), material="pec")
  sim.add(Box((0.010, 0.010, z0), (0.070, 0.065, z0 + 8*dz_sub)), material="fr4")
  sim.add(Box((0.0253, 0.0185, z0 + 8*dz_sub),
              (0.0548, 0.0565, z0 + 9*dz_sub)), material="pec")
  sim.add_source((0.033, 0.0375, z0 + dz_sub*2.5), "ez",
                 waveform=GaussianPulse(f0=2.4e9, bandwidth=1.2))
  sim.add_probe((0.045, 0.0425, z0 + dz_sub*2.5), "ez")

  for n_warm in (0, 500, 2000):
      fr = sim.forward(n_steps=8000, n_warmup=n_warm,
                       emit_time_series=True, checkpoint_every=200)
      ts = np.asarray(fr.time_series).ravel()
      dt = float(fr.grid.dt if hasattr(fr, "grid") and fr.grid else 1e-12)
      # harminv fails on empty → skip analysis; just verify shape + finite
      print(f"[n_warmup={n_warm:5d}] shape={ts.shape} max|Ez|={np.max(np.abs(ts)):.3e}")

  # Bit-match vs n_warmup=0
  ts0 = np.asarray(sim.forward(n_steps=2000).time_series)
  ts_w = np.asarray(sim.forward(n_steps=2000, n_warmup=500).time_series)
  rel = float(np.max(np.abs(ts0 - ts_w)) / max(np.max(np.abs(ts0)), 1e-30))
  print(f"[bit-match] n_warmup=500 vs plain rel_err = {rel:.3e}")
  assert rel < 1e-5, "n_warmup must not change physics"
  print("PASS")
  PY
  echo "=== DONE ==="
