name: rfx-physics-gate-port-external-floquet
description: "Broad-E5 external-reference shard: floquet modal diagnostics + readiness"
tags: [rfx, physics-gate, port-external, floquet, sparameter-validation]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  set -euo pipefail
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx || true
  echo "=== rfx port external-reference shard: floquet_port ==="
  echo "=== expected state ==="
  echo "This shard fails until the broad-E5 external/reference evidence is present and marked broad_e5_passed."
  echo "=== working tree ==="
  git status --short || true
  echo "=== install runtime dependencies (repo path, no editable install) ==="
  python -m pip install -q "scipy>=1.11" "h5py>=3.8" "matplotlib>=3.7"
  export RFX_REPO_ROOT="/root/workspace/byungkwan-workspace/research/rfx"
  export PYTHONPATH="$RFX_REPO_ROOT:${PYTHONPATH:-}"
  python -c "import numpy, rfx; print('dependency_probe=passed', 'numpy', numpy.__version__, 'rfx', getattr(rfx, '__version__', 'unknown'))"
  output_root="${RFX_PORT_EXTERNAL_OUTPUT_ROOT:-.omx/physics-gate/vessl-2026-05-09-port-external}"
  out="$output_root/port_external_floquet"
  mkdir -p "$out"
  echo "=== dependency audit ==="
  set +e
  python scripts/diagnostics/check_external_solver_dependencies.py \
    --output-dir "$out/dependencies"
  dependency_audit_rc=$?
  set -e
  echo "external_solver_dependency_audit_rc=$dependency_audit_rc"
  echo "=== synthetic Floquet modal oracle ==="
  python scripts/diagnostics/report_floquet_modal_oracles.py \
    --output-dir "$out/floquet_modal_oracles"
  echo "=== analytic Floquet homogeneous-slab oracle ==="
  python scripts/diagnostics/report_floquet_periodic_slab_oracles.py \
    --output-dir "$out/floquet_periodic_slab_oracles"
  echo "=== real-FDTD Floquet homogeneous-slab analytic comparison ==="
  python scripts/diagnostics/build_floquet_slab_analytic_comparison.py \
    --output-dir "$out/floquet_slab_analytic_comparison" \
    --n-steps "${RFX_FLOQUET_SLAB_N_STEPS:-240}"
  echo "=== real-FDTD Floquet empty-space analytic-null comparison ==="
  python scripts/diagnostics/build_floquet_empty_space_analytic_comparison.py \
    --output-dir "$out/floquet_empty_space_analytic_comparison" \
    --n-steps "${RFX_FLOQUET_MODAL_N_STEPS:-120}"
  echo "=== broad-E5 readiness report ==="
  set +e
  python scripts/diagnostics/report_port_external_reference_shard.py \
    --family floquet_port \
    --output-dir "$out" \
    --require-complete
  rc=$?
  set -e
  echo "=== shard result ==="
  cat "$out/floquet_port_external_reference_shard.json"
  exit "$rc"
