name: rfx-issue31-physics
description: "Issue #31: segmented path with real physics loss (minimize_reflected_energy) — loss must move"
tags: [rfx, issue-31, memory-efficient, physics, gpu]
resources:
  cluster: remilab-c0
  preset: gpu-rtx4090
image: nvcr.io/nvidia/jax:24.10-py3
env:
  PYTHONUNBUFFERED: "1"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  HDF5_USE_FILE_LOCKING: "FALSE"
  LANG: "C.UTF-8"
mount:
  /root/workspace/: volume://remilab-fs/personal-workspaces/
run: |-
  cd /root/workspace/byungkwan-workspace/research/rfx
  git config --global --add safe.directory /root/workspace/byungkwan-workspace/research/rfx
  git fetch --all
  git checkout nu-memory-efficient
  git pull --ff-only origin nu-memory-efficient || true
  pip install -q -e ".[dev]"

  echo "=========================================="
  echo "Issue #31 — segmented + real physics loss"
  echo "Expect: non-trivial grad, loss trajectory moves across iters"
  echo "=========================================="

  # Small scale, 10 iters — emit_time_series=True + minimize_reflected_energy
  echo ""
  echo "=== Small (207k cells, n_steps=2000, chunk=64, 10 iters) ==="
  timeout 900 python scripts/issue31_big_smoke.py \
    --ext-mm 20 --dx-mm 0.5 --n-steps 2000 --n-iters 10 \
    --checkpoint 1 --emit-ts 1 --checkpoint-every 64

  # Medium scale — should also converge
  echo ""
  echo "=== Medium (608k cells, n_steps=5000, chunk=100, 6 iters) ==="
  timeout 1800 python scripts/issue31_big_smoke.py \
    --ext-mm 40 --dx-mm 0.5 --n-steps 5000 --n-iters 6 \
    --checkpoint 1 --emit-ts 1 --checkpoint-every 100

  echo ""
  echo "=== DONE ==="
